# Mentra — dedicated subdomain vhost for a SHARED VPS (sits alongside other sites).
# NOT a default_server and NOT a catch-all: it only answers for its own server_name,
# so it cannot hijack lootmarket.store / cashytype.lootmarket.store.
#
# Install:
#   sudo cp nginx/mentra.vps.conf /etc/nginx/sites-available/mentra.conf
#   sudo ln -s /etc/nginx/sites-available/mentra.conf /etc/nginx/sites-enabled/mentra.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d app.mentradev.sbs     # issues cert + rewrites the :80 block
#
# Replace MENTRA_DOMAIN below with your real subdomain before installing.

# Social/messaging crawlers that unfurl a pasted link. They do NOT run JavaScript, so
# they only ever see the static tags in apps/web/index.html — which is why every shared
# /watch/<id> link previews as the same generic Mentra card. The location below routes
# just these agents to the API's server-rendered OG shell so previews carry the real
# title, topic, and thumbnail. Everyone else falls through to the SPA untouched.
#
# Googlebot is deliberately absent: it executes JS, and handing a search crawler
# different HTML than users get is cloaking. This list is only link-preview bots.
#
# Lives at http{} context (outside server{}) because `map` is not valid inside a server
# block — sites-enabled/* is included from within http{}, so this is legal here. Define
# it in exactly ONE enabled vhost: a second copy of the same name is a duplicate-map
# error and nginx will refuse to start.
map $http_user_agent $mentra_is_social_crawler {
  default 0;
  "~*facebookexternalhit|Facebot|WhatsApp|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Slack-ImgProxy|Discordbot|Pinterest|redditbot|SkypeUriPreview|vkShare|Iframely|Embedly|Applebot|Bitrix|Google-PageRenderer" 1;
}

server {
  listen 80;
  listen [::]:80;
  server_name MENTRA_DOMAIN;

  # certbot rewrites this to a 301 -> https after issuing the cert. Until then it serves.
  root /srv/mentra/apps/web/dist;
  index index.html;
  client_max_body_size 12m;          # resume / image uploads

  # API → Node service on :4000 (preserves full /api/... URI).
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.IO (live-session chat / presence) — same Node service, WebSocket upgrade.
  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
  }

  # LiveKit signaling WebSocket (client appends /rtc to LIVEKIT_WS_URL).
  location /rtc {
    proxy_pass http://127.0.0.1:7880;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
  }

  # Shared video links. Link-preview crawlers get the API's server-rendered OG shell
  # (real title / topic / thumbnail); every human falls through to the SPA exactly as
  # before. Must sit ahead of the SPA fallback below, which would otherwise swallow
  # this path unconditionally. `rewrite ... last` is one of the two directives that are
  # safe inside `if` (nginx's "if is evil" caveat), and re-runs location matching so
  # the rewritten /api/... URI lands on the proxy block above.
  location ^~ /watch/ {
    if ($mentra_is_social_crawler) {
      rewrite ^/watch/([^/]+)/?$ /api/v1/public/videos/$1/og last;
    }
    try_files $uri $uri/ /index.html;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
