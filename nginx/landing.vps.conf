# Mentra — marketing LANDING vhost for the ROOT domain on a SHARED VPS.
# Serves the static landing page (landing/index.html) and proxies /api/ to the same Node
# service so the onboarding enquiry form posts SAME-ORIGIN (no CORS needed). The React app
# itself lives on the app.* subdomain (see mentra.vps.conf).
#
# NOT a default_server / catch-all: it only answers for its own server_name.
#
# Install:
#   sudo cp nginx/landing.vps.conf /etc/nginx/sites-available/mentra-landing.conf
#   sudo ln -s /etc/nginx/sites-available/mentra-landing.conf /etc/nginx/sites-enabled/mentra-landing.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mentradev.sbs -d www.mentradev.sbs   # issues cert + :80 redirect
#
# Replace LANDING_DOMAIN below with your real root domain before installing.

server {
  listen 80;
  listen [::]:80;
  server_name LANDING_DOMAIN www.LANDING_DOMAIN;

  # certbot rewrites this to a 301 -> https after issuing the cert. Until then it serves.
  root /srv/mentra/landing;
  index index.html;
  client_max_body_size 1m;

  # Onboarding enquiries (public) → Node service on :4000, same-origin from this domain.
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static single-page site.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
