# Mentra — single-origin nginx site. Serves the built web app and reverse-proxies
# the API (/api) and LiveKit signaling (/rtc). LiveKit MEDIA is WebRTC over UDP and
# connects directly to the host (UDP 7882 / TCP 7881) — it does NOT pass through nginx.
#
# For production, terminate TLS here (certbot --nginx) and switch the app's
# WEB_APP_ORIGIN / LIVEKIT_WS_URL / LINKEDIN_REDIRECT_URI to https:// + wss://.

# Link-preview crawlers, which never run the SPA's JS — see the /watch/ block below and
# the longer note in mentra.vps.conf. Mirrored here so previews behave the same on the
# VM as in production. This file and mentra.vps.conf are never enabled on the same
# nginx (one is the VM default_server, the other a VPS subdomain vhost); if they ever
# were, the duplicate map name would fail nginx -t.
map $http_user_agent $mentra_is_social_crawler {
  default 0;
  "~*facebookexternalhit|Facebot|WhatsApp|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Slack-ImgProxy|Discordbot|Pinterest|redditbot|SkypeUriPreview|vkShare|Iframely|Embedly|Applebot|Bitrix|Google-PageRenderer" 1;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /srv/mentra/apps/web/dist;
  index index.html;
  client_max_body_size 5g;           # resume / image uploads

  # API → Node service. proxy_pass without a path preserves the full /api/... URI.
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.IO (live-session chat / presence / raise-hand) — same Node service as /api,
  # but it's a WebSocket so it needs the upgrade headers. The web client connects with
  # transports:['websocket'] (no HTTP-poll fallback), so this MUST be proxied or live
  # chat/presence silently fail (the handshake would otherwise hit the SPA fallback).
  location /socket.io/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;        # keep long-lived WS open
  }

  # LiveKit signaling WebSocket (the client appends /rtc to LIVEKIT_WS_URL).
  location /rtc {
    proxy_pass http://127.0.0.1:7880;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;        # keep long-lived WS open
  }

  # phpMyAdmin (DB admin UI) at /phpmyadmin. The apt package installs to
  # /usr/share/phpmyadmin, so /phpmyadmin/... maps there under root /usr/share.
  # WARNING: this is a full database console on the same origin as the app. Fine for the
  # local VM; in production put it behind auth / a VPN / an IP allowlist, or drop it.
  location /phpmyadmin {
    root /usr/share;
    index index.php;
    try_files $uri $uri/ =404;

    location ~ ^/phpmyadmin/(.+\.php)$ {
      root /usr/share;
      fastcgi_pass unix:/run/php/php8.1-fpm.sock;
      fastcgi_index index.php;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      include fastcgi_params;
    }

    location ~* ^/phpmyadmin/(.+\.(?:css|js|gif|jpe?g|png|ico|svg|woff2?|ttf))$ {
      root /usr/share;
      expires 7d;
    }
  }

  # Shared video links. Link-preview crawlers get the API's server-rendered OG shell so
  # the unfurl carries the session's real title/topic/thumbnail; humans fall through to
  # the SPA. Must precede the fallback below, which would otherwise swallow the path.
  location ^~ /watch/ {
    if ($mentra_is_social_crawler) {
      rewrite ^/watch/([^/]+)/?$ /api/v1/public/videos/$1/og last;
    }
    try_files $uri $uri/ /index.html;
  }

  # SPA fallback — every other path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
